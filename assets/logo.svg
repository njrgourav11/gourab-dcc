<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 112" role="img" aria-labelledby="logoTitle logoDesc">
  <title id="logoTitle">Gourab De Drug Addiction Centre</title>
  <desc id="logoDesc">A calm blue recovery centre logo with a protective heart, rising sun, and pathway mark.</desc>
  <defs>
    <linearGradient id="markBg" x1="12" y1="10" x2="96" y2="98" gradientUnits="userSpaceOnUse">
      <stop stop-color="#ffffff"/>
      <stop offset="0.48" stop-color="#e5f4fc"/>
      <stop offset="1" stop-color="#bfe1f5"/>
    </linearGradient>
    <linearGradient id="markBlue" x1="28" y1="25" x2="82" y2="88" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2b8cc4"/>
      <stop offset="1" stop-color="#1a5f8c"/>
    </linearGradient>
    <filter id="softShadow" x="0" y="0" width="118" height="118" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="10" stdDeviation="9" flood-color="#2b8cc4" flood-opacity="0.18"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <rect x="8" y="8" width="96" height="96" rx="26" fill="url(#markBg)" stroke="#d1e9f8" stroke-width="1.5"/>
    <path d="M56 22c16.9 0 30.5 13.1 30.5 29.2 0 20.1-21.1 33.6-30.5 38-9.4-4.4-30.5-17.9-30.5-38C25.5 35.1 39.1 22 56 22Z" fill="url(#markBlue)"/>
    <path d="M39.5 58.5c7.6 1.8 15.8 1.8 23.3 0 4.3-1 8.2-2.7 11.7-5" fill="none" stroke="#e8f4fd" stroke-width="4" stroke-linecap="round"/>
    <path d="M43 50c3.4-5.9 8-9 13-9s9.6 3.1 13 9" fill="none" stroke="#ffffff" stroke-width="4.2" stroke-linecap="round"/>
    <path d="M56 40v33" fill="none" stroke="#ffffff" stroke-width="4.2" stroke-linecap="round"/>
    <path d="M44.5 70.5 53 78.8 69.5 61" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g fill="#1a5f8c">
    <text x="124" y="48" font-family="Cormorant Garamond, Georgia, serif" font-size="31" font-weight="700">Gourab De</text>
    <text x="124" y="77" font-family="Cormorant Garamond, Georgia, serif" font-size="27" font-weight="700" fill="#2b8cc4">Drug Addiction Centre</text>
    <path d="M125 87h252" stroke="#c2e2f7" stroke-width="2" stroke-linecap="round"/>
    <text x="124" y="101" font-family="DM Sans, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="2.6" fill="#5a8aaa">A UNIT OF SR FOUNDATION</text>
